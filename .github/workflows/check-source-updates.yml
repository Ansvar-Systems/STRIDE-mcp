name: Check Source Updates

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6 AM UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build database
        run: npm run build:db

      - name: Generate golden hashes
        run: npm run build:hashes

      - name: Check for data drift
        run: |
          if git diff --exit-code fixtures/golden-hashes.json; then
            echo "✅ No data drift detected"
          else
            echo "::warning::Data drift detected in golden hashes!"
            echo "## Data Drift Detected" >> $GITHUB_STEP_SUMMARY
            echo "The golden hashes have changed, indicating the database content has drifted from the committed baseline." >> $GITHUB_STEP_SUMMARY
            echo '```diff' >> $GITHUB_STEP_SUMMARY
            git diff fixtures/golden-hashes.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
